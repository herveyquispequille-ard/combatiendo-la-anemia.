<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perú sin anemia - Interactivo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @keyframes pulse-soft { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        .animar-tarjeta:active { transform: scale(0.95); }
        #relleno-barra { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col justify-between">
    <header class="bg-gradient-to-r from-red-600 to-red-700 text-white px-4 py-3.5 shadow-md flex items-center justify-between sticky top-0 z-50">
        <span class="bg-white/20 text-white text-xs font-semibold px-2.5 py-1 rounded-full tracking-wider">Proyecto Educativo</span>
        <div class="text-right">
            <p class="text-[10px] uppercase opacity-80 leading-none">Nivel de Hierro</p>
            <div class="w-20 h-1.5 bg-white/30 rounded-full mt-1 overflow-hidden">
                <div id="relleno-barra" class="h-full bg-yellow-400 w-1/5"></div>
            </div>
        </div>
    </header>
    <main class="max-w-md mx-auto p-4 flex-grow w-full flex flex-col justify-center">
        <div id="contenedor-principal" class="bg-white rounded-3xl shadow-xl p-6 border border-slate-100 transition-all duration-300 min-h-[460px] flex flex-col justify-between animate-[pulse-soft_4s_infinite]">
            <div id="pantalla-inicio" class="text-center space-y-6">
                <h1 class="text-3xl font-bold text-slate-900">¡Hola, Guerrero!</h1>
                <p class="text-slate-500">¿Listo para vencer a la anemia?</p>
                <img src="https://img.freepik.com/vector-premium/personaje-dibujos-animados-superheroe-fuerte-manzana-roja-pecho-ilustracion-vectorial_701594-1428.jpg" class="w-40 mx-auto rounded-2xl shadow-lg">
                <button onclick="iniciarSelector()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all animar-tarjeta">DESCUBRIR SÚPER ALIMENTOS 🍎</button>
            </div>
            <div id="pantalla-selector" class="hidden text-center space-y-4">
                <div class="h-40 flex items-center justify-center bg-slate-50 rounded-2xl overflow-hidden">
                    <img id="img-alimento" src="" class="h-full object-cover hidden">
                    <span id="emoji-grande" class="text-6xl">❓</span>
                </div>
                <h2 id="nombre-alimento" class="text-2xl font-bold text-red-600">¿Qué comeremos hoy?</h2>
                <p id="desc-alimento" class="text-slate-600 text-sm italic">Presiona el botón para elegir un alimento.</p>
                <button onclick="elegirAlimento()" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl animar-tarjeta">AZAR: CARRETITA NUTRICIONAL 🎡</button>
                <button onclick="irATrivia()" class="w-full border-2 border-slate-200 text-slate-500 font-semibold py-2 rounded-xl text-sm">Probar Trivia 🎮</button>
            </div>
            <div id="pantalla-trivia" class="hidden space-y-6">
                <h2 class="text-xl font-bold text-center">¡Reto Rápido! ⚡</h2>
                <div id="opciones" class="grid gap-3"></div>
                <button onclick="volverAlMenu()" class="w-full text-slate-400 text-xs font-medium uppercase pt-4">Volver al inicio</button>
            </div>
        </div>
    </main>
    <footer class="text-center py-4 text-[10px] text-slate-400 font-medium tracking-widest uppercase">&copy; 2026 Perú Sin Anemia</footer>
    <script>
        const alimentos = [
            { nombre: "Sangrecita", desc: "¡El rey del hierro!", emoji: "🩸", img: "https://t2.uc.ltmcdn.com/es/posts/5/0/5/como_hacer_sangrecita_peruana_51505_orig.jpg" },
            { nombre: "Hígado", desc: "Poderoso aliado del hierro.", emoji: "🥩", img: "https://img.freepik.com/foto-gratis/higado-pollo-crudo-plato-blanco_114579-24574.jpg" }
        ];
        let progreso = 20;
        function iniciarSelector() { document.getElementById('pantalla-inicio').classList.add('hidden'); document.getElementById('pantalla-selector').classList.remove('hidden'); }
        function elegirAlimento() { const a = alimentos[Math.floor(Math.random() * alimentos.length)]; document.getElementById('img-alimento').src = a.img; document.getElementById('img-alimento').classList.remove('hidden'); document.getElementById('emoji-grande').classList.add('hidden'); document.getElementById('nombre-alimento').innerText = a.nombre; document.getElementById('desc-alimento').innerText = a.desc; progreso = Math.min(progreso + 15, 100); document.getElementById('relleno-barra').style.width = progreso + "%"; }
        function irATrivia() { document.getElementById('pantalla-selector').classList.add('hidden'); document.getElementById('pantalla-trivia').classList.remove('hidden'); document.getElementById('opciones').innerHTML = `<button onclick="alert('¡Correcto!'); progreso+=20; volverAlMenu()" class='p-4 bg-red-100 rounded-xl'>Sangrecita</button>`; }
        function volverAlMenu() { document.getElementById('pantalla-trivia').classList.add('hidden'); document.getElementById('pantalla-selector').classList.add('hidden'); document.getElementById('pantalla-inicio').classList.remove('hidden'); }
    </script>
</body>
</html>
