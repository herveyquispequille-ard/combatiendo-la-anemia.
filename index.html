<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perú sin anemia - Interactivo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @keyframes pulse-soft { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        .animar-tarjeta:active { transform: scale(0.95); }
        .tostada { transition: transform .18s ease, opacity .18s ease; }
        #relleno-de-barra { transform-origin: 0 0; transition: transform .4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col justify-between">
    <header class="bg-gradient-to-r from-red-600 to-red-700 text-white px-4 py-3.5 shadow-md flex items-center justify-between sticky top-0 z-50">
        <span class="bg-white/20 text-white text-xs font-semibold px-2.5 py-1 rounded-full tracking-wider">Proyecto Educativo</span>
    </header>
    <main class="max-w-md mx-auto p-4 flex-grow w-full flex flex-col justify-center">
        <div id="contenedor-principal" class="bg-white rounded-3xl shadow-xl p-6 border border-slate-100 transition-all duration-300 min-h-[460px] flex flex-col justify-between animate-[pulse-soft_4s_infinite]"></div>
    </main>
    <footer class="text-center py-4 text-xs text-slate-400 font-medium tracking-wide">
        &copy; 2026 Perú Sin Anemia
    </footer>
</body>
</html>
